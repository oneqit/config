# Custom prefix: C-a or F1 switches IM to English, then enters prefix key table
unbind C-b
set -g prefix F12
bind -T root C-a {
  run-shell -b "if [ -x ~/.local/bin/tmux-im-status ]; then ~/.local/bin/tmux-im-status switch-english; fi"
  switch-client -T prefix
}
bind -T root F1 {
  run-shell -b "if [ -x ~/.local/bin/tmux-im-status ]; then ~/.local/bin/tmux-im-status switch-english; fi"
  switch-client -T prefix
}
bind -T prefix C-a send-keys C-a

# Normalize split keys: | for horizontal split, - for vertical
unbind '"'
unbind %
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
bind _ split-window -v -p 66 -c "#{pane_current_path}" \; split-window -v -p 50 -c "#{pane_current_path}"

# Pane navigation: prefix + vi keys (h/j/k/l)
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Pane resizing: prefix + arrow keys
bind -r Left  resize-pane -L 5
bind -r Down  resize-pane -D 2
bind -r Up    resize-pane -U 2
bind -r Right resize-pane -R 5

# copy-mode-vi key bindings (Vim-like)
bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi y send-keys -X copy-selection
bind-key -T copy-mode-vi C-v send-keys -X begin-selection \; send-keys -X rectangle-toggle
bind-key -T copy-mode-vi C-e send-keys -X scroll-down
bind-key -T copy-mode-vi C-y send-keys -X scroll-up

# Use vi-style keys in copy-mode (e.g., v to begin selection, y to copy)
set -g mode-keys vi

# Default word-separators (restored after double-click selection)
set -g word-separators "!\"#$%&'()*+,-./:;<=>?@[\\]^`{|}~"

# Show PREFIX in the status line while prefix is active
set -g status-left '#{?#{==:#{client_key_table},prefix},[PREFIX] ,} '

# Scrollback buffer size
set -g history-limit 10000

# Mouse support (scroll, select panes, resize panes)
set -g mouse on

# Reduce mouse wheel scroll speed (default: 5 lines)
bind-key -T copy-mode-vi WheelUpPane send-keys -X -N 1 scroll-up
bind-key -T copy-mode-vi WheelDownPane send-keys -X -N 1 scroll-down

# Clipboard integration (when supported)
set -g set-clipboard on

# Copy current directory to clipboard: prefix + y
bind y run-shell "printf '%s' '#{pane_current_path}' | { command -v pbcopy >/dev/null && pbcopy || xclip -selection clipboard; }" \; display-message "Copied: #{pane_current_path}"

# Triple-click selects by whitespace only (paths, branches, URLs)
# while preserving normal word-separators for copy-mode w/b/e navigation
bind -T root TripleClick1Pane {
    select-pane -t =
    if-shell -F "#{||:#{pane_in_mode},#{mouse_any_flag}}" {
        send-keys -M
    } {
        set -p word-separators ' '
        copy-mode
        send-keys -X select-word
        set -pu word-separators
    }
}
bind -T copy-mode-vi TripleClick1Pane {
    select-pane
    set -p word-separators ' '
    send-keys -X select-word
    set -pu word-separators
}

# Double-ESC exits copy-mode (single ESC clears selection)
bind -T copy-mode-vi Escape if-shell -F "#{@esc-pressed}" {
    set -pu @esc-pressed
    send-keys -X cancel
} {
    set -p @esc-pressed 1
    send-keys -X clear-selection
    run-shell -b "sleep 0.3 && tmux set -pu @esc-pressed"
}

# Allow passthrough for Kitty graphics protocol
set -gq allow-passthrough on

# Enable hyperlinks (clickable URLs with Cmd+click)
set -ga terminal-features ",*:hyperlinks"

# Status bar: refresh every 1s, show input method status
set -g status-interval 1
set -g status-right-length 60
set -g status-right '[#{@im-status}] "#{=16:pane_title}" %Y-%m-%d %H:%M:%S '

# Pane focus indicator: bright active border
set -g pane-active-border-style fg=brightgreen
set -g pane-border-style fg=colour238
set -g pane-border-status top
set -g pane-border-format '#{?pane_active,#[bg=green fg=black]  #{pane_index} #[bg=colour22 fg=green nobold]#[fg=white]  #{pane_current_path} #[bg=colour238 fg=colour22]#[fg=white]  #{pane_current_command} #[bg=default fg=colour238]#[default],}'

# Enable focus events for vim/neovim autoread
set -g focus-events on
